<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 175" width="200" height="175">
  <!-- ELS Personal Logo | Erick Alberto Loria Soto | Below · Color · Dark -->
  <defs>
    <radialGradient id="vgc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1DA381" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#004099" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="200" height="175" fill="#001433"/>

  <!-- accretion disk -->
  <ellipse cx="100" cy="100" rx="36" ry="10" stroke="#1DA381" stroke-width=".8" fill="none" opacity=".38" transform="rotate(-18 100 100)"/>
  <ellipse cx="100" cy="100" rx="52" ry="14" stroke="#004099" stroke-width=".5" fill="none" opacity=".16" transform="rotate(-18 100 100)"/>
  <!-- vertex glow -->
  <circle cx="100" cy="100" r="20" fill="url(#vgc)"/>
  <!-- jet upper-right -->
  <line x1="100" y1="100" x2="185" y2="44" stroke="#1DA381" stroke-width="1.2" stroke-linecap="round" opacity=".85"/>
  <line x1="100" y1="100" x2="181" y2="40" stroke="#1DA381" stroke-width=".5" stroke-linecap="round" opacity=".38"/>
  <!-- counter-jet lower-left -->
  <line x1="100" y1="100" x2="18" y2="154" stroke="#1DA381" stroke-width=".7" stroke-linecap="round" opacity=".25"/>
  <!-- tracks toward E -->
  <path d="M100,100 Q72,84 54,62"  stroke="#4d8ed4" stroke-width=".9" fill="none" stroke-linecap="round" opacity=".58"/>
  <path d="M100,100 L44,100"        stroke="#4d8ed4" stroke-width=".9" stroke-linecap="round" opacity=".44"/>
  <path d="M100,100 Q72,116 54,136" stroke="#4d8ed4" stroke-width=".9" fill="none" stroke-linecap="round" opacity=".44"/>
  <!-- tracks toward S -->
  <path d="M100,100 Q128,84 148,66"  stroke="#DF6935" stroke-width=".85" fill="none" stroke-linecap="round" opacity=".5"/>
  <path d="M100,100 Q128,116 146,134" stroke="#DF6935" stroke-width=".85" fill="none" stroke-linecap="round" opacity=".46"/>
  <!-- track to L bottom -->
  <path d="M100,100 L74,138" stroke="#DF6935" stroke-width=".8" stroke-linecap="round" opacity=".48"/>
  <!-- secondary splays -->
  <line x1="54"  y1="62"  x2="42" y2="50" stroke="#4d8ed4" stroke-width=".55" opacity=".3" stroke-linecap="round"/>
  <line x1="148" y1="66"  x2="160" y2="54" stroke="#DF6935" stroke-width=".55" opacity=".3" stroke-linecap="round"/>
  <!-- vertex dot -->
  <circle cx="100" cy="100" r="3.2" fill="#1DA381"/>
  <circle cx="100" cy="100" r="1.5" fill="#fff"/>
  <!-- hit dots -->
  <circle cx="44"  cy="100" r="1.3" fill="#4d8ed4" opacity=".6"/>
  <circle cx="54"  cy="62"  r="1.3" fill="#4d8ed4" opacity=".5"/>
  <circle cx="54"  cy="136" r="1.3" fill="#4d8ed4" opacity=".5"/>
  <circle cx="74"  cy="138" r="1.3" fill="#DF6935" opacity=".5"/>
  <circle cx="148" cy="66"  r="1.3" fill="#DF6935" opacity=".5"/>
  <circle cx="146" cy="134" r="1.3" fill="#DF6935" opacity=".5"/>
  <circle cx="185" cy="44"  r="2.2" fill="#1DA381" opacity=".5"/>
  <text x="100" y="118" font-family="'DM Sans', -apple-system, sans-serif" font-weight="500" font-size="72" fill="white" text-anchor="middle" letter-spacing="4">ELS</text>
  <line x1="24" y1="130" x2="176" y2="130" stroke="#004099" stroke-width=".5" opacity=".3"/>
  <text x="100" y="146" font-family="'DM Sans', -apple-system, sans-serif" font-weight="500" font-size="12" fill="white" letter-spacing="3" text-anchor="middle">ERICK LORIA</text>
  <text x="100" y="163" font-family="'DM Sans', -apple-system, sans-serif" font-weight="300" font-size="9" fill="#1DA381" letter-spacing="5" text-anchor="middle">SOTO</text>
</svg>